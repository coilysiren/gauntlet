repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.12.5
          - pytest>=9.0.3
          - pyyaml>=6.0.3
          - types-PyYAML>=6.0.12
