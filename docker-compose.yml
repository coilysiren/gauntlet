services:
  api:
    build: .
    command: uv run python demo_api/server.py
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 2s
      timeout: 5s
      retries: 10

  demo:
    build: .
    command: uv run gauntlet http://api:8000 --name "Demo Task API"
    depends_on:
      api:
        condition: service_healthy
    environment:
      - FLUX_GATE_OPERATOR_TYPE
      - FLUX_GATE_OPERATOR_KEY
      - FLUX_GATE_ADVERSARY_TYPE
      - FLUX_GATE_ADVERSARY_KEY

  test:
    build: .
    command: uv run pytest -m "not docker"
