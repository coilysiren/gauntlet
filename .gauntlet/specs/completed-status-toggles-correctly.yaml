title: Completed status toggles correctly
description: >
  The task API must accurately track and update the completed status of a task.
  An owner must be able to mark a task complete and then incomplete again, with
  each state persisted and reflected on subsequent reads.
acceptance_criteria:
  - A newly created task has completed set to false
  - A PATCH setting completed to true returns the updated task with completed true
  - A subsequent GET returns the task with completed true
  - A PATCH setting completed back to false returns the task with completed false
  - A subsequent GET returns the task with completed false
target_endpoints:
  - POST /tasks
  - PATCH /tasks/{id}
  - GET /tasks/{id}
