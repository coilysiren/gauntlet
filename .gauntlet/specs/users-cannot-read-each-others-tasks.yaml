title: Users cannot read each other's tasks
description: >
  The task API must enforce read-level ownership. A user who did not create a task
  must not be able to retrieve it. GET requests must check ownership and reject
  unauthorized reads with 403, not silently return data.
acceptance_criteria:
  - A GET request by a non-owner is rejected with 403
  - The task body is not returned in the 403 response
  - A GET by the owner succeeds with 200 and returns the correct task body
target_endpoints:
  - POST /tasks
  - GET /tasks/{id}
