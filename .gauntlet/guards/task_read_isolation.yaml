title: Users cannot read each other's tasks
description: >
  The task API must enforce read isolation. A user who did not create a task
  must not be able to retrieve it. The GET endpoint must check ownership before
  returning any task data.
must_hold:
  - A GET request by a non-owner returns 403
  - The response body for an unauthorized GET contains no task data
  - The owner can still successfully retrieve the task after an unauthorized access attempt
target_endpoints:
  - POST /tasks
  - GET /tasks/{id}
